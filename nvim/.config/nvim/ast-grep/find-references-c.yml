id: find-references
language: c
rule:
  any:
    - kind: call_expression
      has:
        field: function
        kind: identifier
        regex: "^FUNC_NAME$"
    - kind: identifier
      regex: "^FUNC_NAME$"
      inside:
        kind: init_declarator
        field: value
        stopBy: end
    # 匹配赋值表达式中的标识符（如 h = c）
    - kind: identifier
      regex: "^FUNC_NAME$"
      inside:
        kind: assignment_expression
        field: right
        stopBy: end
  not:
    # 排除函数定义中的函数名
    inside:
      kind: function_declarator
      stopBy: end
