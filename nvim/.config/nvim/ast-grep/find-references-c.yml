id: find-references
language: c
rule:
  any:
    - kind: call_expression
      has:
        field: function
        kind: identifier
        regex: "^FUNC_NAME$"
    - kind: identifier
      regex: "^FUNC_NAME$"
      inside:
        kind: init_declarator
        field: value
        stopBy: end
    - kind: identifier
      regex: "^FUNC_NAME$"
      inside:
        kind: assignment_expression
        field: right
        stopBy: end
  not:
    inside:
      kind: function_declarator
      stopBy: end
