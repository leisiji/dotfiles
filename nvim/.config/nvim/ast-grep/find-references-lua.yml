id: find-references
language: lua
rule:
  any:
    # 匹配函数调用: FUNC_NAME()
    - pattern: FUNC_NAME($$$)
    # 匹配赋值语句右侧的标识符（如 local x = FUNC_NAME）
    - kind: identifier
      regex: "^FUNC_NAME$"
      inside:
        kind: assignment_statement
        stopBy: end
  not:
    # 排除函数定义中的函数名
    inside:
      kind: function_declaration
      stopBy: end
